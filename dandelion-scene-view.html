<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dandelion Scene View — Anh Li</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Instrument+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
:root{--paper:#fff4d6;--muted:rgba(255,244,214,.68);--gold:#ecd18a;--bg:url('./images/hero/dandelion-field.png');--person:url('./images/hero/anh-li-cutout-softedge.png');--cover:url('./uploads/chuyen-tinh-nay-no-la.jpg')}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050504;color:var(--paper);font-family:'Instrument Sans',system-ui,sans-serif}body{overflow-x:hidden}.scene{position:relative;min-height:100svh;overflow:hidden;isolation:isolate;background:#070705}.scene:before{content:'';position:absolute;inset:0;background-image:var(--bg);background-size:cover;background-position:center bottom;transform:scale(1.03);filter:saturate(1.05) contrast(1.04) brightness(.94);z-index:0}.scene:after{content:'';position:absolute;inset:0;z-index:20;pointer-events:none;background:radial-gradient(85% 72% at 58% 48%,transparent 34%,rgba(6,5,3,.26) 70%,rgba(4,3,2,.82)),linear-gradient(90deg,rgba(5,5,4,.68),transparent 34%,rgba(3,3,2,.3)),linear-gradient(0deg,rgba(3,3,2,.78),transparent 42%)}.light{position:absolute;inset:-10%;z-index:1;background:radial-gradient(48% 42% at 11% 22%,rgba(255,231,160,.62),transparent 60%),radial-gradient(32% 28% at 72% 24%,rgba(145,198,255,.17),transparent 72%);mix-blend-mode:screen;opacity:.75}.ui{position:absolute;z-index:30;left:7vw;top:13vh;max-width:min(42vw,650px);text-shadow:0 8px 42px rgba(0,0,0,.62)}.eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:1.2rem}h1{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,10.2vw,12rem);font-weight:300;line-height:.86;letter-spacing:-.045em;margin:0 0 1.25rem}h1 em{font-style:italic;color:var(--gold)}.lead{max-width:470px;color:var(--muted);font-size:1rem;line-height:1.78;margin:0 0 2rem}.btn{display:inline-block;border:1px solid rgba(255,244,214,.26);border-radius:999px;padding:.86rem 1.15rem;color:var(--paper);text-decoration:none;background:rgba(8,10,6,.38);backdrop-filter:blur(14px);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}.btn.primary{background:linear-gradient(135deg,#fff1c5,#ccb069);color:#17140c;border-color:rgba(255,244,214,.6);font-weight:700}.cd-case{position:absolute;right:6vw;top:8vh;width:min(43vw,720px);aspect-ratio:1;z-index:6;filter:drop-shadow(0 44px 84px rgba(0,0,0,.45));transform:perspective(1200px) rotateY(-8deg) rotateX(1deg)}.case-glass{position:absolute;inset:0;border:1px solid rgba(255,255,255,.48);border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.05) 45%,rgba(255,255,255,.2));box-shadow:inset 0 0 0 3px rgba(255,255,255,.08),inset 22px 0 44px rgba(255,255,255,.14)}.case-glass:before{content:'';position:absolute;left:6%;top:0;bottom:0;width:5%;border-inline:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08)}.disc{position:absolute;inset:9% 9% 9% 13%;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.35),transparent 22%,rgba(114,200,255,.18) 38%,rgba(255,120,210,.15) 56%,rgba(255,244,205,.24)),var(--cover);background-size:cover;background-position:center;box-shadow:0 0 0 1px rgba(255,255,255,.25),inset 0 0 60px rgba(255,255,255,.12);opacity:.78;mix-blend-mode:screen;overflow:hidden}.disc:before{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle,rgba(255,255,255,.12) 0 1px,transparent 1px 6px),linear-gradient(118deg,rgba(255,255,255,.52),transparent 28% 70%,rgba(255,255,255,.24))}.disc:after{content:'';position:absolute;left:50%;top:50%;width:16%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,#111 0 30%,rgba(255,255,255,.7) 33% 45%,rgba(30,30,28,.42) 48%)}.figure{position:absolute;z-index:10;background-image:var(--person);background-size:contain;background-position:center bottom;background-repeat:no-repeat;filter:drop-shadow(0 24px 50px rgba(0,0,0,.4)) brightness(.76) saturate(.72)}.figure.sit{left:28vw;bottom:5vh;width:min(27vw,430px);height:min(66vh,720px)}.figure.stand{right:33vw;bottom:14vh;width:min(20vw,330px);height:min(70vh,780px);transform:scaleX(-1);opacity:.9;filter:drop-shadow(0 24px 50px rgba(0,0,0,.42)) brightness(.55) saturate(.4)}.foreground{position:absolute;z-index:18;left:-4%;right:-4%;bottom:-4%;height:32vh;background:linear-gradient(to top,rgba(16,28,9,.9),rgba(16,28,9,.44) 42%,transparent),radial-gradient(70% 100% at 50% 100%,rgba(255,244,214,.2),transparent 70%)}.album-garden{position:absolute;inset:0;z-index:12}.card{position:absolute;width:var(--w,150px);aspect-ratio:1;border:1px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;background:rgba(255,255,255,.08);box-shadow:0 22px 48px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.05);transform:perspective(900px) rotateX(18deg) rotateY(var(--ry,-16deg)) rotateZ(var(--rz,-8deg));cursor:pointer;transition:transform .45s,filter .45s}.card:hover{transform:perspective(900px) rotateX(10deg) translateY(-8px);filter:brightness(1.08)}.card img{width:100%;height:100%;object-fit:cover;display:block;opacity:.86}.card:after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5),transparent 28% 72%,rgba(255,255,255,.12));mix-blend-mode:screen}.card:nth-child(1){left:11vw;bottom:15vh;--w:clamp(105px,8vw,170px);--rz:-10deg;--ry:-26deg}.card:nth-child(2){left:22vw;bottom:9vh;--w:clamp(120px,10vw,210px);--rz:7deg;--ry:18deg;opacity:.72}.card:nth-child(3){right:20vw;bottom:9vh;--w:clamp(125px,10vw,210px);--rz:-7deg;--ry:-18deg}.card:nth-child(4){right:7vw;bottom:22vh;--w:clamp(100px,8vw,160px);--rz:9deg;--ry:21deg;opacity:.65}.panel{position:absolute;z-index:35;left:7vw;right:7vw;bottom:4vh;display:flex;align-items:center;gap:.8rem;overflow:auto;padding:.75rem;border:1px solid rgba(255,244,214,.18);border-radius:22px;background:linear-gradient(135deg,rgba(5,7,4,.66),rgba(17,25,10,.36));backdrop-filter:blur(18px);box-shadow:0 22px 66px rgba(0,0,0,.42)}.album-btn{display:flex;align-items:center;gap:.7rem;border:0;background:transparent;color:rgba(255,248,225,.76);padding:.45rem .7rem;border-radius:14px;cursor:pointer}.album-btn:hover,.album-btn.active{background:rgba(255,244,214,.09);color:var(--paper)}.album-btn img{width:48px;height:48px;border-radius:8px;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,.35)}.album-btn span{display:block;font-size:.7rem;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:145px}.album-btn small{display:block;color:rgba(255,248,225,.48);font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;margin-top:.18rem}.note{margin-left:auto;color:rgba(255,248,225,.52);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;padding-right:.9rem}@media(max-width:900px){.ui{left:1.35rem;right:1.35rem;top:auto;bottom:23vh;max-width:none}h1{font-size:clamp(4rem,18vw,7rem)}.cd-case{right:-22vw;top:8vh;width:78vw;opacity:.72}.figure.sit{left:11vw;width:48vw;height:54vh;opacity:.78}.figure.stand{right:6vw;width:38vw;height:58vh;opacity:.5}.panel{left:1rem;right:1rem;bottom:1rem}.note{display:none}.card:nth-child(n+3){display:none}}
</style>
</head>
<body>
<main class="scene">
  <div class="light" aria-hidden="true"></div>
  <div class="cd-case" aria-hidden="true"><div class="case-glass"></div><div class="disc"></div></div>
  <div class="figure stand" aria-hidden="true"></div><div class="figure sit" aria-hidden="true"></div>
  <div class="album-garden" id="garden"></div><div class="foreground" aria-hidden="true"></div>
  <section class="ui"><div class="eyebrow">Anh Li & D-Li · Separate scene view</div><h1>Âm nhạc<br/><em>là cảm xúc.</em></h1><p class="lead" id="desc">View riêng để test composite: nền dandelion, nhân vật layer, CD case, album rải rác và cover lấy từ music-data.</p><a class="btn primary" href="./index.html">Về trang chính</a></section>
  <nav class="panel" id="albums" aria-label="Album preview"><div class="note">Click album để đổi mặt CD</div></nav>
</main>
<script src="./music-data.js"></script>
<script>
(function(){
 const fallback=[{name:'Chuyện Tình Này...Nó Lạ...',sub:'Anh Li & D-Li',cover:'uploads/chuyen-tinh-nay-no-la.jpg'},{name:'Cả Biển Trời Trong Mắt',sub:'Anh Li',cover:'uploads/ca-bien-troi-trong-mat.jpg'},{name:'01KhoảngLặng',sub:'Anh Li',cover:'uploads/01-khoang-lang.jpg'},{name:'Những Kẻ DRILL Loves',sub:'D-Band',cover:'uploads/nhung-ke-drill-loves.jpg'}];
 const albums=(window.PORTFOLIO_MUSIC&&Array.isArray(window.PORTFOLIO_MUSIC.albums)?window.PORTFOLIO_MUSIC.albums:fallback).filter(a=>a&&a.cover);
 const preferred=['debb379c-7814-426c-8409-abe0f0a43215','35ce4803-2ec5-405a-abdb-4a4a2cbf64a1','c6672b33-6803-4fa3-8c9d-900d15dfaf2d','560a4089-5871-4536-8375-785f7a2f8dca'];
 albums.sort((a,b)=>{const ai=preferred.indexOf(a.id),bi=preferred.indexOf(b.id);return (ai<0?99:ai)-(bi<0?99:bi)});
 const cover=a=>String(a.cover||'').replace(/^\.\//,''); const root=document.documentElement,garden=document.getElementById('garden'),panel=document.getElementById('albums'),desc=document.getElementById('desc');
 function setAlbum(album,idx){root.style.setProperty('--cover',`url('${cover(album)}')`);desc.textContent=album.desc||`${album.name} · ${album.sub||'playlist'}`;document.querySelectorAll('.album-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));}
 albums.slice(0,4).forEach((a,i)=>{const c=document.createElement('button');c.className='card';c.type='button';c.title=a.name;c.innerHTML=`<img src="${cover(a)}" alt="${a.name||''}">`;c.onclick=()=>setAlbum(a,i);garden.appendChild(c)});
 albums.slice(0,6).forEach((a,i)=>{const b=document.createElement('button');b.className='album-btn';b.type='button';b.innerHTML=`<img src="${cover(a)}" alt=""><span>${a.name||'Untitled'}<small>${a.sub||'playlist'}</small></span>`;b.onclick=()=>setAlbum(a,i);panel.insertBefore(b,panel.firstChild)});
 setAlbum(albums[0]||fallback[0],0);
})();
</script>
</body>
</html>
