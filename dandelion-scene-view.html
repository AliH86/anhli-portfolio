<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dandelion Scene View — Anh Li</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Instrument+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
:root{--paper:#fff4d6;--muted:rgba(255,244,214,.68);--gold:#ecd18a;--bg:url('./images/hero/dandelion-field.png');--person:url('./images/hero/anh-li-cutout-softedge.png');--cover:url('./uploads/chuyen-tinh-nay-no-la.jpg')}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050504;color:var(--paper);font-family:'Instrument Sans',system-ui,sans-serif}body{overflow-x:hidden}.scene{position:relative;min-height:100svh;overflow:hidden;isolation:isolate;background:#070705}.scene:before{content:'';position:absolute;inset:0;background-image:var(--bg);background-size:cover;background-position:center bottom;transform:scale(1.03);filter:saturate(1.05) contrast(1.04) brightness(.94);z-index:0}.scene:after{content:'';position:absolute;inset:0;z-index:30;pointer-events:none;background:radial-gradient(85% 72% at 58% 48%,transparent 34%,rgba(6,5,3,.26) 70%,rgba(4,3,2,.82)),linear-gradient(90deg,rgba(5,5,4,.68),transparent 34%,rgba(3,3,2,.3)),linear-gradient(0deg,rgba(3,3,2,.78),transparent 42%)}.light{position:absolute;inset:-10%;z-index:1;background:radial-gradient(48% 42% at 11% 22%,rgba(255,231,160,.62),transparent 60%),radial-gradient(32% 28% at 72% 24%,rgba(145,198,255,.17),transparent 72%);mix-blend-mode:screen;opacity:.75}.ui{position:absolute;z-index:40;left:7vw;top:13vh;max-width:min(42vw,650px);text-shadow:0 8px 42px rgba(0,0,0,.62)}.eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:1.2rem}h1{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,10.2vw,12rem);font-weight:300;line-height:.86;letter-spacing:-.045em;margin:0 0 1.25rem}h1 em{font-style:italic;color:var(--gold)}.lead{max-width:470px;color:var(--muted);font-size:1rem;line-height:1.78;margin:0 0 2rem}.btn{display:inline-block;border:1px solid rgba(255,244,214,.26);border-radius:999px;padding:.86rem 1.15rem;color:var(--paper);text-decoration:none;background:rgba(8,10,6,.38);backdrop-filter:blur(14px);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}.btn.primary{background:linear-gradient(135deg,#fff1c5,#ccb069);color:#17140c;border-color:rgba(255,244,214,.6);font-weight:700}.cd-case{position:absolute;right:6vw;top:8vh;width:min(43vw,720px);aspect-ratio:1;z-index:6;filter:drop-shadow(0 44px 84px rgba(0,0,0,.45));transform:perspective(1200px) rotateY(-8deg) rotateX(1deg)}.case-glass{position:absolute;inset:0;border:1px solid rgba(255,255,255,.48);border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.05) 45%,rgba(255,255,255,.2));box-shadow:inset 0 0 0 3px rgba(255,255,255,.08),inset 22px 0 44px rgba(255,255,255,.14)}.case-glass:before{content:'';position:absolute;left:6%;top:0;bottom:0;width:5%;border-inline:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08)}.disc{position:absolute;inset:9% 9% 9% 13%;border-radius:50%;background:var(--cover);background-size:cover;background-position:center;box-shadow:0 0 0 1px rgba(255,255,255,.25),inset 0 0 60px rgba(255,255,255,.12);opacity:.8;overflow:hidden;isolation:isolate}.disc:before{content:'';position:absolute;inset:-1%;border-radius:50%;z-index:2;background:repeating-radial-gradient(circle,rgba(255,255,255,.11) 0 1px,transparent 1px 6px),conic-gradient(from 0deg,rgba(255,255,255,.12),rgba(118,214,255,.34),rgba(255,126,219,.22),rgba(255,247,197,.26),rgba(255,255,255,.12));mix-blend-mode:screen;opacity:.72;animation:discShimmer 12s linear infinite;transform-origin:center}.disc:after{content:'';position:absolute;left:50%;top:50%;width:16%;aspect-ratio:1;transform:translate(-50%,-50%);z-index:3;border-radius:50%;background:radial-gradient(circle,#111 0 30%,rgba(255,255,255,.7) 33% 45%,rgba(30,30,28,.42) 48%)}@keyframes discShimmer{from{rotate:0deg}to{rotate:360deg}}.figure{position:absolute;z-index:11;background-image:var(--person);background-size:contain;background-position:center bottom;background-repeat:no-repeat;filter:drop-shadow(0 18px 28px rgba(0,0,0,.46)) drop-shadow(0 0 1px rgba(255,244,214,.26)) brightness(.76) saturate(.72)}.figure.sit{left:28vw;bottom:5vh;width:min(27vw,430px);height:min(66vh,720px)}.figure.stand{right:33vw;bottom:14vh;width:min(20vw,330px);height:min(70vh,780px);transform:scaleX(-1);opacity:.9;filter:drop-shadow(0 18px 28px rgba(0,0,0,.5)) drop-shadow(0 0 1px rgba(255,244,214,.22)) brightness(.55) saturate(.4)}.foreground{position:absolute;z-index:24;left:-4%;right:-4%;bottom:-4%;height:32vh;background:linear-gradient(to top,rgba(16,28,9,.9),rgba(16,28,9,.44) 42%,transparent),radial-gradient(70% 100% at 50% 100%,rgba(255,244,214,.2),transparent 70%);pointer-events:none}.album-garden{position:absolute;inset:0;z-index:14;pointer-events:none}.card{position:absolute;width:var(--w,150px);aspect-ratio:1;border:1px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;background:rgba(255,255,255,.08);box-shadow:0 22px 48px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.05);transform:perspective(900px) rotateX(var(--rx,18deg)) rotateY(var(--ry,-16deg)) rotateZ(var(--rz,-8deg));opacity:var(--o,.78)}.card img{width:100%;height:100%;object-fit:cover;display:block;opacity:.86}.card:after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5),transparent 28% 72%,rgba(255,255,255,.12));mix-blend-mode:screen}.card.soft{filter:blur(.25px);opacity:.42}@media(max-width:900px){.ui{left:1.35rem;right:1.35rem;top:auto;bottom:12vh;max-width:none}h1{font-size:clamp(4rem,18vw,7rem)}.cd-case{right:-22vw;top:8vh;width:78vw;opacity:.72}.figure.sit{left:11vw;width:48vw;height:54vh;opacity:.78}.figure.stand{right:6vw;width:38vw;height:58vh;opacity:.5}.card:nth-child(n+4){display:none}}@media(prefers-reduced-motion:reduce){.disc:before{animation:none}}
</style>
</head>
<body>
<main class="scene"><div class="light" aria-hidden="true"></div><div class="cd-case" aria-hidden="true"><div class="case-glass"></div><div class="disc"></div></div><div class="figure stand" aria-hidden="true"></div><div class="figure sit" aria-hidden="true"></div><div class="album-garden" id="garden" aria-hidden="true"></div><div class="foreground" aria-hidden="true"></div><section class="ui"><div class="eyebrow">Anh Li & D-Li · Separate scene view</div><h1>Âm nhạc<br/><em>là cảm xúc.</em></h1><p class="lead" id="desc">View riêng để test composite: nền dandelion, nhân vật layer, CD case, album rải rác và cover lấy từ music-data.</p><a class="btn primary" href="./index.html">Về trang chính</a></section></main>
<script src="./music-data.js"></script>
<script>
(function(){
 const DEFAULT_ALBUM_ID='debb379c-7814-426c-8409-abe0f0a43215';
 const albums=(window.PORTFOLIO_MUSIC&&Array.isArray(window.PORTFOLIO_MUSIC.albums)?window.PORTFOLIO_MUSIC.albums:[]).filter(a=>a&&a.cover);
 const fallback={id:'default',name:'Chuyện Tình Này...Nó Lạ...',sub:'Anh Li & D-Li',cover:'uploads/chuyen-tinh-nay-no-la.jpg'};
 const cover=a=>String(a.cover||'').replace(/^\.\//,''); const root=document.documentElement,garden=document.getElementById('garden'),desc=document.getElementById('desc');
 const chosen=albums.find(a=>a.id===DEFAULT_ALBUM_ID)||albums[0]||fallback;
 root.style.setProperty('--cover',`url('${cover(chosen)}')`); desc.textContent=chosen.desc||`${chosen.name} · ${chosen.sub||'playlist'}`;
 const pool=albums.filter(a=>a!==chosen).map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); if(!pool.length) pool.push(chosen);
 const slots=[{x:11,y:15,w:'clamp(105px,8vw,170px)',rz:-10,ry:-26,o:.82},{x:23,y:9,w:'clamp(120px,10vw,210px)',rz:7,ry:18,o:.62},{r:20,y:9,w:'clamp(125px,10vw,210px)',rz:-7,ry:-18,o:.76},{r:7,y:22,w:'clamp(100px,8vw,160px)',rz:9,ry:21,o:.52},{x:48,y:6,w:'clamp(80px,6vw,130px)',rz:-18,ry:26,o:.34,soft:true},{r:35,y:28,w:'clamp(90px,7vw,150px)',rz:14,ry:-20,o:.28,soft:true}];
 pool.slice(0,slots.length).forEach((a,i)=>{const s=slots[i],c=document.createElement('span');c.className='card'+(s.soft?' soft':'');c.style.setProperty('--w',s.w);c.style.setProperty('--rz',s.rz+'deg');c.style.setProperty('--ry',s.ry+'deg');c.style.setProperty('--o',s.o);c.style.bottom=s.y+'vh'; if(s.x!=null)c.style.left=s.x+'vw'; if(s.r!=null)c.style.right=s.r+'vw'; c.innerHTML=`<img src="${cover(a)}" alt="">`;garden.appendChild(c)});
})();
</script>
</body>
</html>
